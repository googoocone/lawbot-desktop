name: release

# v0.2.0 처럼 v로 시작하는 태그를 push하면 자동으로:
#   tsc+vite 빌드 → Rust 빌드 → 서명 → GitHub Release 생성 + 인스톨러·latest.json 업로드
# 설치된 앱들은 다음 실행 때 latest.json을 보고 자동 업데이트한다.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write # Release 생성/업로드 권한

    steps:
      - uses: actions/checkout@v4

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          echo "빌드 버전: $VERSION"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.8 # 로컬과 동일 버전 고정 (esbuild 빌드 승인 동작 보장)

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 업데이트 서명 (Secrets에 등록 필요)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # 프론트엔드 빌드 시 인라인되는 환경변수 (Secrets에 등록 필요)
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CRAWLER_URL: ${{ secrets.VITE_CRAWLER_URL }}
          VITE_CRAWLER_SECRET: ${{ secrets.VITE_CRAWLER_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "law-bot 사건관리 ${{ github.ref_name }}"
          releaseBody: "이 버전부터 앱이 자동으로 업데이트됩니다."
          releaseDraft: false
          prerelease: false
