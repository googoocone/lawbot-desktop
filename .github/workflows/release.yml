name: release

# v0.2.0 처럼 v로 시작하는 태그를 push하면 자동으로:
#   tsc+vite 빌드 → Rust 빌드 → 서명 → GitHub Release 생성 + 인스톨러·latest.json 업로드
# 설치된 앱들은 다음 실행 때 latest.json을 보고 자동 업데이트한다.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write # Release 생성/업로드 권한

    steps:
      - uses: actions/checkout@v4

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          echo "빌드 버전: $VERSION"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.8 # 로컬과 동일 버전 고정 (esbuild 빌드 승인 동작 보장)

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # esbuild 빌드 스크립트 무시로 인한 exit 1은 무해(vite는 별도 바이너리 사용).
      # .npmrc의 only-built-dependencies로 보통 통과하지만, 안전장치로 실패를 넘긴다.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # pnpm이 'tauri build' 실행 전 deps를 재검사하며 install을 또 돌리는 걸 끔
          # (esbuild 빌드 무시 exit 1로 빌드가 실패하는 원인)
          npm_config_verify_deps_before_run: "false"
          # 업데이트 서명 (Secrets에 등록 필요)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # 프론트엔드 빌드 시 인라인되는 환경변수 (Secrets에 등록 필요)
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CRAWLER_URL: ${{ secrets.VITE_CRAWLER_URL }}
          VITE_CRAWLER_SECRET: ${{ secrets.VITE_CRAWLER_SECRET }}
        with:
          # pnpm을 거치지 않고 tauri CLI를 node로 직접 실행 → pnpm의 deps 재검사(install) 회피
          tauriScript: node node_modules/@tauri-apps/cli/tauri.js
          tagName: ${{ github.ref_name }}
          releaseName: "law-bot 사건관리 ${{ github.ref_name }}"
          releaseBody: "이 버전부터 앱이 자동으로 업데이트됩니다."
          releaseDraft: false
          prerelease: false

      # tauriScript로 pnpm을 우회하면 tauri-action이 latest.json을 안 만들므로 직접 생성·첨부.
      # updater는 이 latest.json을 보고 setup.exe를 받아 설치한다.
      - name: Generate and upload latest.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart("v")
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          $exe = Get-ChildItem "$nsisDir/*-setup.exe" | Select-Object -First 1
          $sigFile = Get-ChildItem "$nsisDir/*-setup.exe.sig" | Select-Object -First 1
          if (-not $exe -or -not $sigFile) { Write-Error "setup.exe 또는 .sig를 찾을 수 없음"; exit 1 }
          $sig = (Get-Content $sigFile.FullName -Raw).Trim()
          $url = "https://github.com/googoocone/lawbot-desktop/releases/download/$tag/$($exe.Name)"
          $obj = [ordered]@{
            version   = $ver
            notes     = "자동 업데이트"
            pub_date  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{ signature = $sig; url = $url }
            }
          }
          $obj | ConvertTo-Json -Depth 10 | Set-Content -Encoding utf8 latest.json
          Write-Host "생성된 latest.json:"; Get-Content latest.json
          gh release upload $tag latest.json --clobber
